<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK Gestures</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video-feed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #subtitle {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 1000;
            pointer-events: none;
            min-width: 300px;
        }

        #subtitle.show {
            opacity: 1;
        }

        #subtitle.infinite-void {
            color: #00ffff;
            text-shadow:
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6),
                0 0 30px rgba(0, 255, 255, 0.4);
        }

        #subtitle.hollow-purple {
            color: #ff00ff;
            text-shadow:
                0 0 10px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(255, 0, 255, 0.6),
                0 0 30px rgba(255, 0, 255, 0.4);
        }
    </style>
</head>
<body>
    <div id="video-container">
        <img id="video-feed" src="{{ url_for('video_feed') }}" alt="Video Feed">
    </div>
    <div id="subtitle"></div>

    <script>
        const subtitleElement = document.getElementById('subtitle');
        let currentText = '';

        function updateSubtitle() {
            fetch('/subtitle')
                .then(response => response.json())
                .then(data => {
                    const newText = data.text || '';

                    if (newText !== currentText) {
                        currentText = newText;

                        if (newText) {
                            subtitleElement.textContent = newText;
                            subtitleElement.className = 'show';

                            // Add specific styling based on gesture
                            if (newText.includes('INFINITE VOID')) {
                                subtitleElement.classList.add('infinite-void');
                            } else if (newText.includes('HOLLOW PURPLE')) {
                                subtitleElement.classList.add('hollow-purple');
                            }
                        } else {
                            subtitleElement.className = '';
                        }
                    }
                })
                .catch(error => console.error('Error fetching subtitle:', error));
        }

        // Poll for subtitle updates every 100ms
        setInterval(updateSubtitle, 100);
    </script>
</body>
</html>
