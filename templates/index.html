<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK Gestures</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #video-feed {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            display: block;
        }

        #subtitle {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            padding: 8px 20px;
            font-size: 18px;
            font-weight: normal;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 1000;
            pointer-events: none;
        }

        #subtitle.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <img id="video-feed" src="{{ url_for('video_feed') }}" alt="Video Feed">
        <div id="subtitle"></div>
    </div>

    <script>
        const subtitleElement = document.getElementById('subtitle');
        let currentText = '';

        function updateSubtitle() {
            fetch('/subtitle')
                .then(response => response.json())
                .then(data => {
                    const newText = data.text || '';

                    if (newText !== currentText) {
                        currentText = newText;

                        if (newText) {
                            subtitleElement.textContent = newText;
                            subtitleElement.className = 'show';
                        } else {
                            subtitleElement.className = '';
                        }
                    }
                })
                .catch(error => console.error('Error fetching subtitle:', error));
        }

        // Poll for subtitle updates every 100ms
        setInterval(updateSubtitle, 100);
    </script>
</body>
</html>
